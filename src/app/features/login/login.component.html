<main class="login-shell">
  <section class="login-card">
    <span class="eyebrow">Закрытый доступ</span>
    <h1>Вход в приложение</h1>
    <p class="intro">Введите логин и пароль, чтобы открыть калькулятор регистрационных ключей.</p>

    <form [formGroup]="form" class="login-form" (ngSubmit)="submit()">
      <label class="field">
        <span>Логин</span>
        <input formControlName="username" autocomplete="username" />
      </label>

      <label class="field">
        <span>Пароль</span>
        <input type="password" formControlName="password" autocomplete="current-password" />
      </label>

      <button type="submit">Войти</button>
    </form>

    @if (errorMessage()) {
      <p class="message">{{ errorMessage() }}</p>
    }
  </section>
</main>
